name: Deploy Blog to Production Server

on:
  push:
    branches: [ "main" ]

env:
  DEPLOY_PATH: /home/jinhan2/blog

jobs:
  # ── 1단계: 문법 검증 (ubuntu-latest) ─────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate app.py syntax
        run: python -m py_compile app.py && echo "✅ app.py OK"

      - name: Validate modules syntax
        run: |
          for f in modules/*.py; do
            python -m py_compile "$f" && echo "✅ $f OK"
          done

  # ── 2단계: 배포 (self-hosted runner) ─────────────────────────
  deploy:
    needs: validate
    runs-on: [self-hosted, blog]
    steps:
      - name: Pull latest code
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO_URL="https://x-access-token:$GH_TOKEN@github.com/jinhan-yoon/blog.git"
          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            echo "저장소가 없음 → 클론"
            mkdir -p "$DEPLOY_PATH"
            git clone "$REPO_URL" "$DEPLOY_PATH"
          else
            echo "저장소 존재 → 업데이트"
            cd "$DEPLOY_PATH"
            git remote set-url origin "$REPO_URL"
            git fetch origin main
            git reset --hard origin/main
          fi

      - name: Install / update dependencies
        run: |
          cd "$DEPLOY_PATH"
          if [ ! -d venv ]; then
            python3 -m venv venv
          fi
          venv/bin/pip install -q --upgrade pip
          venv/bin/pip install -q -r requirements.txt

      - name: Register systemd service
        run: |
          SERVICE=/etc/systemd/system/blog-streamlit.service
          sed "s|WorkingDirectory=.*|WorkingDirectory=$DEPLOY_PATH|g; \
               s|ExecStart=.*|ExecStart=$DEPLOY_PATH/venv/bin/streamlit run app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false|g; \
               s|EnvironmentFile=.*|EnvironmentFile=$DEPLOY_PATH/.env|g; \
               /^User=/d" "$DEPLOY_PATH/blog-streamlit.service" \
            | sudo tee "$SERVICE" > /dev/null
          sudo systemctl daemon-reload
          sudo systemctl enable blog-streamlit.service

      - name: Ensure .env exists
        run: |
          if [ ! -f "$DEPLOY_PATH/.env" ]; then
            cp "$DEPLOY_PATH/.env.example" "$DEPLOY_PATH/.env"
            echo "⚠️ .env 가 없어 .env.example 에서 복사했습니다. 실제 값을 설정해주세요."
          fi

      - name: Restart service
        run: |
          sudo systemctl restart blog-streamlit.service
          sleep 3
          sudo systemctl is-active blog-streamlit.service && echo "✅ blog-streamlit 서비스 정상 실행"
