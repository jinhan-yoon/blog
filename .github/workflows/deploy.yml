name: Deploy Blog to Production Server

on:
  push:
    branches: [ "main" ]

jobs:
  # ── 1단계: 문법 검증 ─────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate app.py syntax
        run: python -m py_compile app.py && echo "✅ app.py OK"

      - name: Validate modules syntax
        run: |
          for f in modules/*.py; do
            python -m py_compile "$f" && echo "✅ $f OK"
          done

  # ── 2단계: 서버 배포 ─────────────────────────────────────────
  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"

            echo "=== 코드 업데이트 ==="
            cd "$DEPLOY_PATH"
            git fetch origin main
            git reset --hard origin/main

            echo "=== 의존성 설치 ==="
            if [ ! -d venv ]; then
              python3 -m venv venv
            fi
            venv/bin/pip install -q --upgrade pip
            venv/bin/pip install -q -r requirements.txt

            echo "=== 서비스 재시작 ==="
            sudo systemctl restart blog-streamlit.service
            sleep 3
            sudo systemctl is-active blog-streamlit.service && echo "✅ 서비스 정상 실행"
